<!doctype html>
<html lang="ja">
<head>
<!-- Google tag (gtag.js) -->

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>公図色付け — ユーザー管理</title>
<style>
  :root { --bar:#1f2430; --bar2:#2b3242; --accent:#4f8cff; --line:#3a4254; --ok:#46d17f; --warn:#ffb454; --err:#ff6b6b; }
  * { box-sizing:border-box; }
  html,body { margin:0; min-height:100%; font-family:"Segoe UI","Meiryo",sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, #2b3242, #11141c); color:#eaeef7; }
  body { padding:28px 18px; }
  .wrap { max-width:1040px; margin:0 auto; }
  .top { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
  .top .title { font-size:18px; font-weight:700; }
  .top .sp { margin-left:auto; }
  .top a { color:var(--accent); text-decoration:none; font-size:13px; margin-left:14px; }
  .stats { font-size:13px; opacity:.7; margin-bottom:10px; }
  table { width:100%; border-collapse:collapse; background:#1f2430; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  th,td { padding:9px 11px; font-size:13px; text-align:left; border-bottom:1px solid var(--line); white-space:nowrap; }
  th { background:#2b3242; font-weight:600; opacity:.85; position:sticky; top:0; }
  tr:last-child td { border-bottom:0; }
  .badge { font-size:11px; padding:2px 8px; border-radius:999px; font-weight:700; }
  .badge.active { background:rgba(70,209,127,.18); color:var(--ok); }
  .badge.none, .badge.canceled { background:rgba(255,107,107,.16); color:var(--err); }
  .badge.past_due, .badge.trialing { background:rgba(255,180,84,.16); color:var(--warn); }
  .yes { color:var(--ok); font-weight:700; }
  .ops { display:flex; gap:5px; flex-wrap:wrap; }
  .ops button { padding:4px 8px; border:1px solid var(--line); border-radius:6px; background:#2b3242;
    color:#cdd5e4; font-size:12px; cursor:pointer; }
  .ops button:hover { background:#39455c; }
  .ops button.danger { color:#ff9b9b; }
  .msg { margin:10px 0; font-size:13px; min-height:18px; }
  .msg.err { color:var(--err); } .msg.ok { color:var(--ok); }
  .empty { padding:20px; text-align:center; opacity:.6; }
  h2.sec { font-size:15px; font-weight:700; margin:30px 0 10px; }
  td.msgcell { white-space:pre-wrap; max-width:420px; word-break:break-word; }
  tr.done td { opacity:.5; }
  .badge.handled { background:rgba(70,209,127,.18); color:var(--ok); }
  .badge.open { background:rgba(255,180,84,.16); color:var(--warn); }
  .badge.ok2 { background:rgba(70,209,127,.18); color:var(--ok); }
  .badge.ng { background:rgba(255,107,107,.16); color:var(--err); }
  td.ua { max-width:360px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:.75; }
  /* ツールバー(検索・ユーザー追加) */
  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0; }
  .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
  .toolbar input[type=search], .toolbar input[type=text]{ flex:1; min-width:200px; padding:8px 12px;
    border:1px solid var(--line); border-radius:8px; background:#1f2430; color:#eaeef7; font-size:13px; outline:none; }
  .toolbar input:focus { border-color:var(--accent); }
  .btn { padding:8px 14px; border:1px solid var(--line); border-radius:8px; background:#2b3242; color:#eaeef7;
    font-size:13px; cursor:pointer; font-family:inherit; }
  .btn:hover { background:#39455c; }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
  #addForm { background:#1f2430; border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:14px;
    display:none; gap:10px; flex-wrap:wrap; align-items:center; }
  #addForm.open { display:flex; }
  #addForm input[type=text], #addForm input[type=password], #addForm input[type=email]{
    padding:8px 10px; border:1px solid var(--line); border-radius:8px; background:#2b3242; color:#fff; font-size:13px; outline:none; }
  #addForm input:focus { border-color:var(--accent); }
  #addForm label { display:flex; align-items:center; gap:5px; font-size:13px; opacity:.85; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <span class="title">🛠 ユーザー管理</span>
      <span class="sp"></span>
      <a href="mypage.html">マイページ</a>
      <a href="index.html">アプリ</a>
      <a id="logout" href="#">ログアウト</a>
    </div>
    <div class="stats" id="stats">読み込み中…</div>
    <div class="toolbar">
      <label class="sr-only" for="search">ユーザー名・メールで検索</label>
      <input type="search" id="search" placeholder="🔍 ユーザー名・メールで検索">
      <button class="btn primary" id="addToggle">＋ ユーザー追加</button>
    </div>
    <div id="addForm">
      <label class="sr-only" for="newUser">ユーザー名(3〜64)</label>
      <input type="text" id="newUser" placeholder="ユーザー名(3〜64)" autocomplete="off" style="min-width:160px">
      <label class="sr-only" for="newPass">パスワード(8文字以上)</label>
      <input type="password" id="newPass" placeholder="パスワード(8文字以上)" autocomplete="new-password" style="min-width:160px">
      <label class="sr-only" for="newEmail">メール(任意)</label>
      <input type="email" id="newEmail" placeholder="メール(任意)" autocomplete="off" style="min-width:180px">
      <label><input type="checkbox" id="newAdmin"> 管理者</label>
      <label><input type="checkbox" id="newGrant" checked> 購読を有効化</label>
      <button class="btn primary" id="createBtn">作成</button>
      <button class="btn" id="addCancel">キャンセル</button>
    </div>
    <div class="msg" id="msg"></div>
    <table>
      <thead><tr>
        <th>#</th><th>ユーザー名</th><th>メール</th><th>購読</th><th>次回更新</th>
        <th>管理者</th><th>登録日</th><th>最終ログイン</th><th>操作</th>
      </tr></thead>
      <tbody id="tbody"><tr><td colspan="9" class="empty">読み込み中…</td></tr></tbody>
    </table>

    <h2 class="sec">📧 お問い合わせ <span id="mailState" style="font-size:12px;font-weight:400;opacity:.6"></span></h2>
    <div class="msg" id="qmsg"></div>
    <table>
      <thead><tr>
        <th>#</th><th>日時</th><th>ユーザー</th><th>返信先</th><th>件名</th><th>内容</th><th>状態</th><th>操作</th>
      </tr></thead>
      <tbody id="qbody"><tr><td colspan="8" class="empty">読み込み中…</td></tr></tbody>
    </table>

    <h2 class="sec">🔑 ログインログ <span id="llState" style="font-size:12px;font-weight:400;opacity:.6"></span></h2>
    <table>
      <thead><tr>
        <th>日時</th><th>ユーザー</th><th>結果</th><th>IP</th><th>端末（User-Agent）</th>
      </tr></thead>
      <tbody id="llbody"><tr><td colspan="5" class="empty">読み込み中…</td></tr></tbody>
    </table>

    <h2 class="sec">🌐 ページアクセス <span id="alState" style="font-size:12px;font-weight:400;opacity:.6"></span></h2>
    <table>
      <thead><tr>
        <th>日時</th><th>ページ</th><th>IP</th><th>端末（User-Agent）</th>
      </tr></thead>
      <tbody id="albody"><tr><td colspan="4" class="empty">読み込み中…</td></tr></tbody>
    </table>
  </div>

<script>
  const $ = s => document.querySelector(s);
  const api = (p, opt) => fetch('api/'+p, Object.assign({headers:{'Content-Type':'application/json'}}, opt||{}));
  const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  let ME=null;

  function badge(s){ s=s||'none'; const m={active:'有効',trialing:'トライアル',past_due:'遅延',canceled:'解約',none:'未加入'};
    const cls=['active','trialing','past_due','canceled'].includes(s)?s:'none'; return '<span class="badge '+cls+'">'+(m[s]||s)+'</span>'; }
  function fmt(t){ return t? String(t).replace('T',' ').slice(0,16) : '—'; }

  async function act(username, action, extra){
    const msg=$('#msg'); msg.className='msg'; msg.textContent='';
    const body = Object.assign({username, action}, extra||{});
    try {
      const r = await api('admin/user', { method:'POST', body: JSON.stringify(body) });
      const d = await r.json();
      if (r.ok){ msg.className='msg ok'; msg.textContent='更新しました'; load(); }
      else { msg.className='msg err'; msg.textContent = d.error || '失敗しました'; }
    } catch(e){ msg.className='msg err'; msg.textContent='通信エラー'; }
  }

  let allUsers = [];
  async function load(){
    try { ME = await (await api('me')).json(); } catch(e){ location.replace('login.html'); return; }
    if (!ME || !ME.authenticated){ location.replace('login.html'); return; }
    if (!ME.admin){ document.body.innerHTML='<div class="wrap"><div class="empty">管理者権限が必要です。 <a href="index.html" style="color:#4f8cff">アプリへ</a></div></div>'; return; }
    let data;
    try { data = await (await api('admin/users')).json(); } catch(e){ $('#stats').textContent='取得に失敗しました'; return; }
    allUsers = data.users || [];
    const active = allUsers.filter(u=>u.sub_status==='active'||u.sub_status==='trialing').length;
    $('#stats').textContent = '全 '+allUsers.length+' ユーザー（有効購読 '+active+'）';
    applyFilter();
  }

  // 検索フィルタ(ユーザー名・メール 部分一致・大小無視)を適用して再描画
  function applyFilter(){
    const q = ($('#search').value||'').trim().toLowerCase();
    const list = q ? allUsers.filter(u=>
      (u.username||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q)) : allUsers;
    renderUsers(list, q);
  }

  function renderUsers(users, q){
    const tb = $('#tbody');
    if (!users.length){
      tb.innerHTML='<tr><td colspan="9" class="empty">'+(q?'該当するユーザーがいません':'ユーザーがいません')+'</td></tr>';
      return;
    }
    tb.innerHTML = users.map(u=>{
      const me = u.username===ME.user;
      return '<tr>'
        + '<td>'+u.id+'</td>'
        + '<td>'+esc(u.username)+(me?' <span style="opacity:.5">(自分)</span>':'')+'</td>'
        + '<td>'+esc(u.email||'—')+'</td>'
        + '<td>'+badge(u.sub_status)+'</td>'
        + '<td>'+fmt(u.current_period_end)+'</td>'
        + '<td>'+(u.is_admin?'<span class="yes">○</span>':'—')+'</td>'
        + '<td>'+fmt(u.created_at)+'</td>'
        + '<td>'+fmt(u.last_login)+'</td>'
        + '<td><div class="ops">'
          + '<button data-u="'+esc(u.username)+'" data-a="grant">有効化</button>'
          + '<button data-u="'+esc(u.username)+'" data-a="revoke">無効化</button>'
          + '<button data-u="'+esc(u.username)+'" data-a="toggleadmin" data-v="'+(u.is_admin?0:1)+'">'+(u.is_admin?'管理者解除':'管理者に')+'</button>'
          + '<button data-u="'+esc(u.username)+'" data-a="passwd">PW変更</button>'
          + (me?'':'<button class="danger" data-u="'+esc(u.username)+'" data-a="delete">削除</button>')
        + '</div></td>'
      + '</tr>';
    }).join('');
    tb.querySelectorAll('button').forEach(btn=>{
      btn.onclick = () => {
        const u=btn.dataset.u, a=btn.dataset.a;
        if (a==='grant') act(u,'grant');
        else if (a==='revoke'){ if(confirm(u+' の購読を無効化しますか？')) act(u,'revoke'); }
        else if (a==='toggleadmin') act(u,'set_admin',{value:+btn.dataset.v});
        else if (a==='passwd'){ const p=prompt(u+' の新しいパスワード（8文字以上）'); if(p) act(u,'set_password',{password:p}); }
        else if (a==='delete'){ if(confirm(u+' を削除しますか？（元に戻せません）')) act(u,'delete'); }
      };
    });
  }

  // ---- お問い合わせ ----
  async function qact(id, action){
    const msg=$('#qmsg'); msg.className='msg'; msg.textContent='';
    try {
      const r = await api('admin/inquiry', { method:'POST', body: JSON.stringify({id, action}) });
      const d = await r.json();
      if (r.ok){ msg.className='msg ok'; msg.textContent='更新しました'; loadInquiries(); }
      else { msg.className='msg err'; msg.textContent = d.error || '失敗しました'; }
    } catch(e){ msg.className='msg err'; msg.textContent='通信エラー'; }
  }

  async function loadInquiries(){
    let data;
    try { data = await (await api('admin/inquiries')).json(); }
    catch(e){ $('#qbody').innerHTML='<tr><td colspan="8" class="empty">取得に失敗しました</td></tr>'; return; }
    const list = data.inquiries || [];
    $('#mailState').textContent = data.mail_ready ? '（メール通知: 有効）' : '（メール通知: 未設定・DB保存のみ）';
    const tb = $('#qbody');
    if (!list.length){ tb.innerHTML='<tr><td colspan="8" class="empty">お問い合わせはありません</td></tr>'; return; }
    tb.innerHTML = list.map(q=>{
      const done = !!q.handled;
      const stbadge = done ? '<span class="badge handled">対応済</span>' : '<span class="badge open">未対応</span>';
      return '<tr class="'+(done?'done':'')+'">'
        + '<td>'+q.id+'</td>'
        + '<td>'+fmt(q.created_at)+'</td>'
        + '<td>'+esc(q.username||'—')+'</td>'
        + '<td>'+(q.email?'<a href="mailto:'+esc(q.email)+'" style="color:#4f8cff">'+esc(q.email)+'</a>':'—')+'</td>'
        + '<td>'+esc(q.subject||'—')+'</td>'
        + '<td class="msgcell">'+esc(q.message||'')+'</td>'
        + '<td>'+stbadge+'</td>'
        + '<td><div class="ops">'
          + (done
              ? '<button data-q="'+q.id+'" data-a="unhandled">未対応に</button>'
              : '<button data-q="'+q.id+'" data-a="handled">対応済に</button>')
          + '<button class="danger" data-q="'+q.id+'" data-a="delete">削除</button>'
        + '</div></td>'
      + '</tr>';
    }).join('');
    tb.querySelectorAll('button').forEach(btn=>{
      btn.onclick = () => {
        const id=+btn.dataset.q, a=btn.dataset.a;
        if (a==='delete'){ if(confirm('このお問い合わせを削除しますか？（元に戻せません）')) qact(id,'delete'); }
        else qact(id, a);
      };
    });
  }

  // ---- 検索 ----
  $('#search').addEventListener('input', applyFilter);

  // ---- ユーザー追加 ----
  $('#addToggle').onclick = () => {
    const f=$('#addForm'); f.classList.toggle('open');
    if (f.classList.contains('open')) $('#newUser').focus();
  };
  $('#addCancel').onclick = () => { $('#addForm').classList.remove('open'); };
  $('#createBtn').onclick = async () => {
    const msg=$('#msg'); msg.className='msg'; msg.textContent='';
    const username=($('#newUser').value||'').trim();
    const password=$('#newPass').value||'';
    const email=($('#newEmail').value||'').trim();
    if (username.length<3){ msg.className='msg err'; msg.textContent='ユーザー名は3文字以上で入力してください'; $('#newUser').focus(); return; }
    if (password.length<8){ msg.className='msg err'; msg.textContent='パスワードは8文字以上で入力してください'; $('#newPass').focus(); return; }
    const body={ username, password, email, is_admin:$('#newAdmin').checked, grant:$('#newGrant').checked };
    $('#createBtn').disabled=true;
    try{
      const r=await api('admin/create_user',{method:'POST', body:JSON.stringify(body)});
      const d=await r.json().catch(()=>({}));
      if (r.ok){
        msg.className='msg ok'; msg.textContent='ユーザー「'+username+'」を作成しました';
        $('#newUser').value=''; $('#newPass').value=''; $('#newEmail').value='';
        $('#newAdmin').checked=false; $('#newGrant').checked=true;
        $('#addForm').classList.remove('open');
        load();
      } else { msg.className='msg err'; msg.textContent = d.error || '作成に失敗しました'; }
    }catch(e){ msg.className='msg err'; msg.textContent='通信エラー'; }
    finally{ $('#createBtn').disabled=false; }
  };
  // 追加フォーム内で Enter キーで作成
  $('#addForm').addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); $('#createBtn').click(); } });

  // ---- ログインログ ----
  async function loadLoginLogs(){
    let data;
    try { data = await (await api('admin/login_logs')).json(); }
    catch(e){ $('#llbody').innerHTML='<tr><td colspan="5" class="empty">取得に失敗しました</td></tr>'; return; }
    const logs = data.logs || [];
    const ng = logs.filter(l=>!l.success).length;
    $('#llState').textContent = '（直近 '+logs.length+'件・失敗 '+ng+'件）';
    const tb = $('#llbody');
    if (!logs.length){ tb.innerHTML='<tr><td colspan="5" class="empty">ログがありません</td></tr>'; return; }
    tb.innerHTML = logs.map(l=>{
      const ok = !!l.success;
      const badge = ok ? '<span class="badge ok2">成功</span>' : '<span class="badge ng">失敗</span>';
      return '<tr>'
        + '<td>'+fmt(l.created_at)+'</td>'
        + '<td>'+esc(l.username||'—')+'</td>'
        + '<td>'+badge+'</td>'
        + '<td>'+esc(l.ip||'—')+'</td>'
        + '<td class="ua" title="'+esc(l.user_agent||'')+'">'+esc(l.user_agent||'—')+'</td>'
      + '</tr>';
    }).join('');
  }

  // ---- ページアクセスログ ----
  async function loadAccessLogs(){
    let data;
    try { data = await (await api('admin/access_logs')).json(); }
    catch(e){ $('#albody').innerHTML='<tr><td colspan="4" class="empty">取得に失敗しました</td></tr>'; return; }
    const logs = data.logs || [];
    $('#alState').textContent = '（直近 '+logs.length+'件）';
    const tb = $('#albody');
    if (!logs.length){ tb.innerHTML='<tr><td colspan="4" class="empty">アクセスがありません</td></tr>'; return; }
    tb.innerHTML = logs.map(l=>'<tr>'
        + '<td>'+fmt(l.created_at)+'</td>'
        + '<td>'+esc(l.page||'—')+'</td>'
        + '<td>'+esc(l.ip||'—')+'</td>'
        + '<td class="ua" title="'+esc(l.user_agent||'')+'">'+esc(l.user_agent||'—')+'</td>'
      + '</tr>').join('');
  }

  $('#logout').onclick = async (e) => { e.preventDefault(); try{ await api('logout',{method:'POST'}); }catch(e){} location.href='login.html'; };
  load().then(()=>{ if (ME && ME.admin){ loadInquiries(); loadLoginLogs(); loadAccessLogs(); } });
</script>
</body>
</html>
